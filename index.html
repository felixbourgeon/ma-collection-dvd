<header>
    <h1>Ma Collection DVD</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Rechercher...">
        
        <div class="controls-row">
            <div class="filter-container">
                <label><input type="checkbox" id="watchlistFilter"> ⭐ Watchlist</label>
            </div>

            <select id="sortSelect">
                <option value="titre-asc">Titre (A-Z)</option>
                <option value="titre-desc">Titre (Z-A)</option>
                <option value="real-asc">Réalisateur (A-Z)</option>
                <option value="real-desc">Réalisateur (Z-A)</option>
                <option value="annee-desc">Plus récents</option>
                <option value="annee-asc">Plus anciens</option>
            </select>
        </div>

        <div id="pagination" class="pagination-container"></div>
    </div>
</header>
